# prefix
# Mac local tmux (outer): C-Space, emitted by right_cmd-tap (Karabiner)
# Linux dev box tmux (inner, nested under the Mac one): C-a, emitted by right_opt-tap (Karabiner)
# Same .tmux.conf shared between both — switch by uname so the prefix doesn't collide when nested.
unbind C-b
if-shell 'test "$(uname)" = Linux' \
  'set -g prefix C-a;     bind C-a     send-prefix; unbind C-Space' \
  'set -g prefix C-Space; bind C-Space send-prefix; unbind C-a'

# general
set -g mouse on
set -g allow-passthrough on                                                    # forward kitty graphics / OSC sequences inner→outer (e.g. `kitten icat`). One-way: terminal replies are intercepted by tmux, so apps that *probe* graphics support (viuer/spotify_player) still hang and need a TERM shim instead.
set -g escape-time 0
set -g repeat-time 500                                                         # default 500ms — window of time after a `-r` bind to chain another tap without re-pressing prefix
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off
set -g allow-rename on

# Linux dev boxes default-login-shell is bash; macOS zsh is at /bin/zsh, so this is a no-op there.
if-shell '[ -x /usr/bin/zsh ]' 'set -g default-shell /usr/bin/zsh'

# ghostty
set -g default-terminal "xterm-ghostty"                                        # inner apps' $TERM — requires xterm-ghostty terminfo installed; otherwise `clear`/tput break ("terminals database inaccessible")
set -g extended-keys always                                                    # force tmux to emit CSI-u sequences to inner apps unconditionally — some (claude code, etc.) don't enable kitty-kbd themselves
set -as terminal-features 'xterm*:extkeys:RGB:hyperlinks:clipboard'            # ghostty features tmux's defaults/terminfo miss: extkeys (CSI-u), RGB (truecolor), hyperlinks (OSC 8), clipboard (OSC 52). Requires `tmux kill-server` after changes.
set -g set-clipboard on                                                        # tmux copy-mode pushes selections to outer terminal via OSC 52 → Mac clipboard, even over SSH
bind -n S-Enter send-keys -l "\e[13;2u"                                        # extended-keys doesn't cover modifier+Enter specifically — without this bind, S-Enter is swallowed instead of forwarded

# status bar — rose pine
set -g status-position top
set -g status-left-length 30
set -g status-style '#{?client_prefix,bg=#403d52,bg=default},fg=#e0def4'       # highlight-med bg on prefix, transparent otherwise
set -g status-left-style 'fg=#ceacf6,bold'                                     # [session], bold iris — matches pane active border / bordersrc
set -g status-right-style 'fg=#908caa'                                         # subtle
setw -g window-status-style 'fg=#6e6a86'                                       # unfocused windows, muted (dim)
setw -g window-status-current-style 'fg=#ceacf6,bold'                          # focused window, bold iris — matches pane active border / bordersrc
setw -g window-status-format '#I:#W#{s/-//:window_flags}'                      # strip the '-' flag (most-recently-focused); keep Z/!/# etc.
setw -g window-status-current-format '#I:#W#{s/\*//:window_flags}'             # color+bold already signal active; strip the '*' flag (keep Z, etc.)
setw -g window-status-activity-style 'fg=#f6c177'                              # notifications, gold
set -g message-style 'bg=#403d52,fg=#e0def4'                                   # highlight-med bg, text fg

# pane border
set -g pane-border-indicators off                                              # status row already indicates active pane; no arrow needed
set -g pane-border-status top                                                  # per-pane status row at top — inherits pane-(active-)border-style for color
set -g pane-border-format ' #{pane_index} #{pane_current_command} '            # row content: pane index + what's running (zsh/nvim/...)
set -g pane-border-style        'fg=#6e6a86'                                   # inactive border, muted — matches bordersrc inactive_color
set -g pane-active-border-style 'fg=#ceacf6,bold'                              # active border, iris — matches bordersrc active_color
set -g pane-border-lines        heavy                                          # thicker glyphs (│ → ┃)

# config
bind C-r source-file ~/.tmux.conf \; display "Config reloaded!"                # C-r = reload (r is rename window)

# window / session (lowercase = window, uppercase = session)

# switch
bind s    run-shell '$DOTFILES_DIR/scripts/tmux-fzf-windows.sh switch'         # s = (s)witch window (fzf) — see scripts/tmux-fzf-windows.sh; $DOTFILES_DIR exported per-host from .zshrc
bind S    run-shell '$DOTFILES_DIR/scripts/tmux-fzf-sessions.sh'               # S = (S)witch session (fzf) — see scripts/tmux-fzf-sessions.sh

# create
bind -r c new-window -c "#{pane_current_path}"                                 # c = (c)reate window; inherits cwd
bind C    command-prompt -p "New session name:" "new-session -A -s '%%'"       # C = (C)reate session; -A attaches if name already exists

# rename
# r = (r)ename window (pins; new window to reset)
bind r    command-prompt -I "#W" -p "Rename window:" "rename-window -- '%%' ; set -w @manual_window_name_set 1 ; set -w allow-rename off"
bind R    command-prompt -I "#S" -p "Rename session:" "rename-session -- '%%'" # R = (R)ename session

# kill
bind k    kill-window                                                          # k = (k)ill window
bind K    kill-session                                                         # K = (K)ill session

# last
bind -r l    last-window                                                       # l = (l)ast window
bind -r L    switch-client -l                                                  # L = (L)ast session
bind -r Tab  last-window                                                       # Tab = last window (alias for l)
bind -r BTab switch-client -l                                                  # Shift-Tab = last session (alias for L)

# window-only: prev/next, swap position
bind -r , previous-window                                                      # , = "<" without shift, points left
bind -r . next-window                                                          # . = ">" without shift, points right
bind -r "<" swap-window -t -1 \; previous-window                               # < = push window backward
bind -r ">" swap-window -t +1 \; next-window                                   # > = push window forward

# panes

# move (colemak-dh: mnei = hjkl)
bind -r m select-pane -L
bind -r n select-pane -D
bind -r e select-pane -U
bind -r i select-pane -R

# resize (colemak-dh: MNEI = HJKL, capital + repeatable)
bind -r M resize-pane -L 5
bind -r N resize-pane -D 5
bind -r E resize-pane -U 5
bind -r I resize-pane -R 5

# create (split)
bind -r '\' split-window -h -c "#{pane_current_path}"                          # \ ≈ vertical divider
bind -r '-' split-window -v -c "#{pane_current_path}"                          # - = horizontal divider

# swap position
bind -r "[" swap-pane -U                                                       # [ = push pane backward
bind -r "]" swap-pane -D                                                       # ] = push pane forward

# layout
bind 0 select-layout even-horizontal                                           # 0 = side-by-side columns, evenly sized

# move pane between windows
# ! = break-pane (default) — pull current pane out into its own new window
bind @ run-shell '$DOTFILES_DIR/scripts/tmux-fzf-windows.sh join'              # @ = fzf window picker, then move this pane into the picked window

# misc
# x = kill-pane is already default; ; = last-pane is already default
bind y setw synchronize-panes \; display "Sync: #{?pane_synchronized,ON,OFF}"  # y = yoke panes together
bind C-l send-keys "clear" \; send-keys "Enter" \; clear-history               # C-l = clear screen + scrollback

# paste
bind p paste-buffer                                                            # p = paste
bind P choose-buffer                                                           # P = Pick from paste history
