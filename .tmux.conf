# prefix
# Mac local tmux (outer): C-Space, emitted by right_cmd-tap (Karabiner)
# Linux dev box tmux (inner, nested under the Mac one): C-a, emitted by right_opt-tap (Karabiner)
# Same .tmux.conf shared between both — switch by uname so the prefix doesn't collide when nested.
unbind C-b
if-shell 'test "$(uname)" = Linux' \
  'set -g prefix C-a;     bind C-a     send-prefix; unbind C-Space' \
  'set -g prefix C-Space; bind C-Space send-prefix; unbind C-a'

# general
set -g mouse on
set -g escape-time 0
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Linux dev boxes default-login-shell is bash; macOS zsh is at /bin/zsh, so this is a no-op there.
if-shell '[ -x /usr/bin/zsh ]' 'set -g default-shell /usr/bin/zsh'

# window rename
set -g automatic-rename off
set -g allow-rename on

# ghostty
set -g default-terminal "xterm-ghostty"                                        # inner apps' $TERM — requires xterm-ghostty terminfo installed; otherwise `clear`/tput break ("terminals database inaccessible")
set -g extended-keys always                                                    # force tmux to emit CSI-u sequences to inner apps unconditionally — some (claude code, etc.) don't enable kitty-kbd themselves
set -as terminal-features 'xterm*:extkeys:RGB:hyperlinks'                      # ghostty features tmux's defaults/terminfo miss: extkeys (CSI-u), RGB (truecolor), hyperlinks (OSC 8). Requires `tmux kill-server` after changes.
bind -n S-Enter send-keys -l "\e[13;2u"                                        # extended-keys doesn't cover modifier+Enter specifically — without this bind, S-Enter is swallowed instead of forwarded

# status bar — catppuccin mocha
set -g status-position top
set -g status-left-length 30
set -g status-style '#{?client_prefix,bg=#45475a,bg=default},fg=#cdd6f4'       # surface1 bg on prefix, transparent otherwise
set -g status-left-style 'fg=#89b4fa,bold'                                     # [session], bold blue
set -g status-right-style 'fg=#a6adc8'                                         # subtext0
setw -g window-status-style 'fg=#6c7086'                                       # unfocused windows, overlay0 (dim)
setw -g window-status-current-style 'fg=#89b4fa,bold'                          # focused window, bold blue
setw -g window-status-activity-style 'fg=#f9e2af'                              # notifications, yellow
set -g message-style 'bg=#45475a,fg=#cdd6f4'                                   # surface1 bg, default text

# pane border
set -g pane-border-indicators off

# config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"                  # r = reload

# splits
bind '\' split-window -h -c "#{pane_current_path}"                             # \ ≈ vertical divider
bind '-' split-window -v -c "#{pane_current_path}"                             # - = horizontal divider

# pane movement (colemak-dh: mnei = hjkl)
bind m select-pane -L
bind n select-pane -D
bind e select-pane -U
bind i select-pane -R

# window navigation
bind , previous-window                                                         # , = "<" without shift, points left
bind . next-window                                                             # . = ">" without shift, points right

# pane resize (colemak-dh: MNEI = HJKL, capital + repeatable)
bind -r M resize-pane -L 5
bind -r N resize-pane -D 5
bind -r E resize-pane -U 5
bind -r I resize-pane -R 5

# new window inherits cwd (override default 'c')
bind c new-window -c "#{pane_current_path}"                                    # c = create window
bind C command-prompt -p "New session name:" "new-session -s '%%'"             # S = create session

# sessions
bind s choose-tree -ZsO time -f '#{==:#{session_attached},0}' -K '#{?#{e|<:#{line},9},#{e|+:#{line},1},#{?#{e|==:#{line},9},0,#{a:#{e|+:#{line},87}}}}'  # s = switch session, 1-indexed, by recency, hide current

# windows list (zoomed)
bind w choose-tree -ZwO time -f '#{==:#{session_attached},0}' -K '#{?#{e|<:#{line},9},#{e|+:#{line},1},#{?#{e|==:#{line},9},0,#{a:#{e|+:#{line},87}}}}'  # w = window list, 1-indexed, by recency, hide current session

# kill bindings
# x = kill-pane is already default                                             # x = kill just this pane
bind X kill-window                                                             # X = X out the whole window

# swap panes
bind -r "<" swap-pane -D                                                       # < = push pane backward
bind -r ">" swap-pane -U                                                       # > = push pane forward

# move window left/right
bind -r "[" swap-window -t -1 \; previous-window                               # [ = bracket points left
bind -r "]" swap-window -t +1 \; next-window                                   # ] = bracket points right

# synchronize panes toggle
bind y setw synchronize-panes \; display "Sync: #{?pane_synchronized,ON,OFF}"  # y = yoke panes together

# clear screen + scrollback
bind C-l send-keys "clear" \; send-keys "Enter" \; clear-history               # C-l = same as terminal clear

# last window / last pane
bind Tab last-window                                                           # Tab = jump back (like alt-tab)
bind BTab last-pane                                                            # Shift-Tab = last pane

# paste
bind p paste-buffer                                                            # p = paste
bind P choose-buffer                                                           # P = Pick from paste history
